services:
  - type: web
    name: task-manager-api
    runtime: java
    repo: https://github.com/Dharshini2506/task_tracker_app_java_auth
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: mvn clean package
    startCommand: java -jar target/*.jar
    envVars:
      - key: DB_URL
        fromDatabase:
          name: task-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: task-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: task-db
          property: password
